<svg xmlns="http://www.w3.org/2000/svg" width="340" height="120" viewBox="0 0 340 120" role="img" aria-label="BinLink Collector">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#111827"/>
    <stop offset="100%" stop-color="#1F2937"/>
  </linearGradient>
  <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FCD34D"/>
    <stop offset="100%" stop-color="#F59E0B"/>
  </linearGradient>
</defs>
<!-- dark background pill -->
<rect width="340" height="120" rx="24" fill="url(#bg)"/>
<!-- truck mark: cab -->
<rect x="30" y="52" width="26" height="30" rx="5" fill="url(#amber)"/>
<!-- truck mark: windshield -->
<rect x="33" y="55" width="20" height="14" rx="3" fill="#1F2937" opacity=".7"/>
<!-- truck mark: body -->
<rect x="55" y="44" width="36" height="38" rx="4" fill="url(#amber)"/>
<!-- truck mark: wheels -->
<circle cx="40" cy="84" r="6" fill="#374151"/>
<circle cx="40" cy="84" r="3" fill="#6B7280"/>
<circle cx="68" cy="84" r="6" fill="#374151"/>
<circle cx="68" cy="84" r="3" fill="#6B7280"/>
<!-- wordmark -->
<text x="105" y="63" font-family="'Plus Jakarta Sans',Arial" font-size="26" font-weight="800" fill="#FFFFFF" letter-spacing="-0.3">Bin</text>
<text x="140" y="63" font-family="'Plus Jakarta Sans',Arial" font-size="26" font-weight="800" fill="#F59E0B" letter-spacing="-0.3">Link</text>
<text x="106" y="84" font-family="'Plus Jakarta Sans',Arial" font-size="16" font-weight="600" fill="#9CA3AF" letter-spacing="1.5">COLLECTOR</text>
</svg>
