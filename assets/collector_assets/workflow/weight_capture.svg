<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <rect width="240" height="200" fill="none"/>
  <!-- Scale base -->
  <rect x="70" y="155" width="100" height="14" rx="7" fill="#374151"/>
  <rect x="108" y="120" width="24" height="36" rx="4" fill="#4B5563"/>
  <!-- Scale platform -->
  <rect x="55" y="105" width="130" height="18" rx="9" fill="#F59E0B"/>
  <!-- Bin on scale -->
  <rect x="85" y="58" width="70" height="50" rx="8" fill="#052659"/>
  <rect x="90" y="63" width="60" height="40" rx="6" fill="#5483B3" opacity="0.5"/>
  <!-- Waste inside bin -->
  <ellipse cx="120" cy="72" rx="25" ry="8" fill="#22C55E" opacity="0.7"/>
  <!-- Weight display -->
  <rect x="90" y="130" width="60" height="24" rx="6" fill="#1F2937"/>
  <text x="120" y="146" font-family="monospace" font-size="13" fill="#F59E0B" text-anchor="middle" font-weight="bold">42 kg</text>
  <!-- Handle -->
  <rect x="105" y="45" width="30" height="16" rx="8" fill="none" stroke="#374151" stroke-width="4"/>
</svg>
