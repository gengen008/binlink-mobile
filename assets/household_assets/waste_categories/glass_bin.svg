<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wine glass -->
  <!-- Bowl: tapered trapezoid, wide top narrow bottom -->
  <path d="M32 5 L68 5 L63 28 Q61 34 50 35 Q39 34 37 28 Z" fill="#C1E8FF"/>
  <!-- Shine line on glass -->
  <line x1="37" y1="10" x2="36" y2="24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Stem -->
  <rect x="47" y="34" width="6" height="12" rx="3" fill="#C1E8FF"/>
  <!-- Base -->
  <rect x="37" y="44" width="26" height="5" rx="2.5" fill="#C1E8FF"/>
  <!-- Bin lid handle -->
  <rect x="43" y="51" width="14" height="8" rx="4" fill="#021024"/>
  <!-- Bin lid -->
  <rect x="19" y="57" width="62" height="11" rx="5.5" fill="#052659"/>
  <!-- Bin body -->
  <rect x="22" y="66" width="56" height="31" rx="8" fill="#5483B3"/>
  <rect x="22" y="77" width="56" height="2" rx="1" fill="#7DA0CA" opacity="0.4"/>
  <rect x="22" y="86" width="56" height="2" rx="1" fill="#7DA0CA" opacity="0.4"/>
</svg>
