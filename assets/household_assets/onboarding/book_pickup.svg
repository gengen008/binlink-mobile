<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280">
  <!-- Soft background -->
  <rect width="360" height="280" fill="#EBF4FF"/>
  <!-- Background grid hint -->
  <line x1="0" y1="70" x2="360" y2="70" stroke="#C1E8FF" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="140" x2="360" y2="140" stroke="#C1E8FF" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="210" x2="360" y2="210" stroke="#C1E8FF" stroke-width="1" opacity="0.5"/>
  <line x1="90" y1="0" x2="90" y2="280" stroke="#C1E8FF" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="0" x2="180" y2="280" stroke="#C1E8FF" stroke-width="1" opacity="0.5"/>
  <line x1="270" y1="0" x2="270" y2="280" stroke="#C1E8FF" stroke-width="1" opacity="0.5"/>

  <!-- Phone outer shadow -->
  <rect x="112" y="18" width="140" height="248" rx="22" fill="#021024" opacity="0.15"/>
  <!-- Phone body -->
  <rect x="108" y="14" width="140" height="248" rx="22" fill="#021024"/>
  <!-- Phone screen -->
  <rect x="116" y="28" width="124" height="220" rx="14" fill="#F5F1EA"/>
  <!-- Notch/camera -->
  <rect x="162" y="18" width="32" height="8" rx="4" fill="#052659"/>

  <!-- APP HEADER on screen -->
  <rect x="116" y="28" width="124" height="38" rx="0" fill="#052659"/>
  <rect x="116" y="28" width="124" height="14" rx="0" fill="#052659"/>
  <!-- BinLink logo dot -->
  <circle cx="133" cy="47" r="6" fill="#19B661"/>
  <rect x="143" y="44" width="38" height="6" rx="3" fill="#C1E8FF" opacity="0.9"/>
  <rect x="222" y="44" width="12" height="6" rx="3" fill="#7DA0CA" opacity="0.7"/>

  <!-- Screen label -->
  <rect x="124" y="76" width="60" height="7" rx="3.5" fill="#052659" opacity="0.7"/>
  <rect x="124" y="88" width="44" height="5" rx="2.5" fill="#7DA0CA" opacity="0.6"/>

  <!-- Category grid (2x2) -->
  <!-- Card 1 - HOUSEHOLD (selected) -->
  <rect x="122" y="102" width="50" height="46" rx="8" fill="#5483B3" opacity="0.18"/>
  <rect x="122" y="102" width="50" height="46" rx="8" fill="none" stroke="#5483B3" stroke-width="2"/>
  <rect x="135" y="109" width="24" height="20" rx="4" fill="#5483B3" opacity="0.6"/>
  <rect x="129" y="133" width="36" height="5" rx="2.5" fill="#5483B3" opacity="0.8"/>
  <!-- Check badge on selected -->
  <circle cx="164" cy="106" r="7" fill="#5483B3"/>
  <polyline points="160,106 163,109 168,103" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 2 - PLASTIC -->
  <rect x="179" y="102" width="50" height="46" rx="8" fill="white"/>
  <rect x="179" y="102" width="50" height="46" rx="8" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="192" y="109" width="24" height="20" rx="4" fill="#C1E8FF" opacity="0.8"/>
  <rect x="186" y="133" width="36" height="5" rx="2.5" fill="#9CA3AF" opacity="0.7"/>

  <!-- Card 3 - ORGANIC -->
  <rect x="122" y="154" width="50" height="46" rx="8" fill="white"/>
  <rect x="122" y="154" width="50" height="46" rx="8" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>
  <ellipse cx="147" cy="168" rx="12" ry="11" fill="#19B661" opacity="0.6"/>
  <rect x="129" y="184" width="36" height="5" rx="2.5" fill="#9CA3AF" opacity="0.7"/>

  <!-- Card 4 - GLASS -->
  <rect x="179" y="154" width="50" height="46" rx="8" fill="white"/>
  <rect x="179" y="154" width="50" height="46" rx="8" fill="none" stroke="#D1D5DB" stroke-width="1.5"/>
  <path d="M196 161 L218 161 L215 174 Q213 178 204 179 Q195 178 193 174 Z" fill="#C1E8FF" opacity="0.8"/>
  <rect x="186" y="184" width="36" height="5" rx="2.5" fill="#9CA3AF" opacity="0.7"/>

  <!-- Continue Button -->
  <rect x="122" y="210" width="107" height="30" rx="15" fill="#5483B3"/>
  <rect x="138" y="220" width="54" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="196" y="222" width="8" height="4" rx="2" fill="white" opacity="0.7"/>

  <!-- Phone home bar -->
  <rect x="158" y="247" width="40" height="4" rx="2" fill="#7DA0CA" opacity="0.5"/>

  <!-- Floating notification bubble (outside phone) -->
  <rect x="258" y="60" width="82" height="44" rx="12" fill="white"/>
  <rect x="258" y="60" width="82" height="44" rx="12" fill="none" stroke="#C1E8FF" stroke-width="1.5"/>
  <circle cx="274" cy="82" r="8" fill="#19B661"/>
  <rect x="288" y="74" width="44" height="6" rx="3" fill="#052659" opacity="0.7"/>
  <rect x="288" y="84" width="36" height="5" rx="2.5" fill="#7DA0CA" opacity="0.7"/>
  <!-- Bubble tail -->
  <polygon points="258,86 244,90 260,94" fill="white"/>

  <!-- Floating badge top-left -->
  <rect x="18" y="90" width="74" height="38" rx="10" fill="#052659"/>
  <circle cx="36" cy="109" r="7" fill="#F59E0B"/>
  <rect x="48" y="103" width="36" height="6" rx="3" fill="white" opacity="0.8"/>
  <rect x="48" y="113" width="28" height="5" rx="2.5" fill="#7DA0CA" opacity="0.7"/>
</svg>
