<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280">
  <!-- Map background -->
  <rect width="360" height="280" fill="#E8F0F8"/>

  <!-- Road grid - horizontal -->
  <rect x="0" y="90" width="360" height="18" rx="0" fill="#D1D5DB"/>
  <rect x="0" y="170" width="360" height="18" rx="0" fill="#D1D5DB"/>
  <!-- Road grid - vertical -->
  <rect x="70" y="0" width="18" height="280" rx="0" fill="#D1D5DB"/>
  <rect x="180" y="0" width="18" height="280" rx="0" fill="#D1D5DB"/>
  <rect x="290" y="0" width="18" height="280" rx="0" fill="#D1D5DB"/>

  <!-- Road markings horizontal -->
  <rect x="10" y="97" width="32" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="62" y="97" width="6" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="100" y="97" width="32" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="200" y="97" width="32" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="250" y="97" width="32" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="310" y="97" width="40" height="4" rx="2" fill="white" opacity="0.7"/>

  <!-- Road markings vertical -->
  <rect x="77" y="10" width="4" height="28" rx="2" fill="white" opacity="0.7"/>
  <rect x="77" y="50" width="4" height="28" rx="2" fill="white" opacity="0.7"/>
  <rect x="77" y="120" width="4" height="28" rx="2" fill="white" opacity="0.7"/>
  <rect x="77" y="200" width="4" height="28" rx="2" fill="white" opacity="0.7"/>
  <rect x="77" y="240" width="4" height="28" rx="2" fill="white" opacity="0.7"/>

  <!-- City blocks (light rectangles) -->
  <rect x="92" y="22" width="82" height="62" rx="6" fill="#CBD5E1"/>
  <rect x="200" y="22" width="82" height="62" rx="6" fill="#CBD5E1"/>
  <rect x="92" y="120" width="82" height="44" rx="6" fill="#CBD5E1"/>
  <rect x="200" y="120" width="82" height="44" rx="6" fill="#CBD5E1"/>
  <rect x="10" y="22" width="54" height="62" rx="6" fill="#CBD5E1"/>
  <rect x="10" y="120" width="54" height="44" rx="6" fill="#CBD5E1"/>
  <rect x="312" y="22" width="38" height="62" rx="6" fill="#CBD5E1"/>
  <rect x="92" y="196" width="82" height="70" rx="6" fill="#CBD5E1"/>
  <rect x="200" y="196" width="82" height="70" rx="6" fill="#CBD5E1"/>
  <rect x="10" y="196" width="54" height="70" rx="6" fill="#CBD5E1"/>
  <rect x="312" y="196" width="38" height="70" rx="6" fill="#CBD5E1"/>

  <!-- Route path (dashed line from origin to truck to destination) -->
  <polyline points="80,235 80,188 80,108 80,53 189,53 189,108 189,188 189,235"
    fill="none" stroke="#5483B3" stroke-width="4" stroke-dasharray="10,6"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Origin pin (home) -->
  <circle cx="80" cy="235" r="14" fill="white"/>
  <circle cx="80" cy="235" r="11" fill="#19B661"/>
  <circle cx="80" cy="235" r="5" fill="white"/>

  <!-- Destination pin -->
  <path d="M189 215 Q189 215 189 235 Q185 225 182 222 Q189 218 196 222 Q193 225 189 235 Z" fill="#EF4444"/>
  <circle cx="189" cy="214" r="14" fill="#EF4444"/>
  <circle cx="189" cy="214" r="7" fill="white"/>
  <circle cx="189" cy="214" r="4" fill="#EF4444"/>

  <!-- Truck (on route, heading to destination) -->
  <!-- Truck body -->
  <rect x="62" y="135" width="48" height="28" rx="5" fill="#5483B3"/>
  <!-- Cab -->
  <rect x="96" y="130" width="22" height="33" rx="5" fill="#052659"/>
  <!-- Cab window -->
  <rect x="100" y="135" width="14" height="10" rx="2" fill="#C1E8FF" opacity="0.8"/>
  <!-- Truck wheels -->
  <circle cx="72" cy="165" r="7" fill="#1F2937"/>
  <circle cx="72" cy="165" r="3.5" fill="#6B7280"/>
  <circle cx="108" cy="165" r="7" fill="#1F2937"/>
  <circle cx="108" cy="165" r="3.5" fill="#6B7280"/>
  <!-- Truck bin/body marks -->
  <rect x="66" y="141" width="8" height="16" rx="2" fill="#7DA0CA" opacity="0.5"/>
  <rect x="78" y="141" width="8" height="16" rx="2" fill="#7DA0CA" opacity="0.5"/>

  <!-- Pulsing ring around truck (movement indicator) -->
  <circle cx="86" cy="150" r="30" fill="none" stroke="#5483B3" stroke-width="2.5" opacity="0.3"/>
  <circle cx="86" cy="150" r="42" fill="none" stroke="#5483B3" stroke-width="1.5" opacity="0.15"/>

  <!-- ETA card (floating) -->
  <rect x="218" y="130" width="124" height="52" rx="12" fill="white"/>
  <rect x="218" y="130" width="124" height="52" rx="12" fill="none" stroke="#C1E8FF" stroke-width="1.5"/>
  <!-- ETA label -->
  <rect x="229" y="141" width="28" height="6" rx="3" fill="#7DA0CA" opacity="0.7"/>
  <!-- ETA value -->
  <rect x="229" y="152" width="50" height="10" rx="5" fill="#052659" opacity="0.8"/>
  <!-- Distance -->
  <rect x="285" y="141" width="44" height="6" rx="3" fill="#C1E8FF" opacity="0.9"/>
  <rect x="295" y="152" width="34" height="10" rx="5" fill="#5483B3" opacity="0.7"/>

  <!-- Speed indicator pill -->
  <rect x="218" y="194" width="80" height="26" rx="13" fill="#19B661"/>
  <rect x="230" y="202" width="16" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="252" y="202" width="36" height="8" rx="4" fill="white" opacity="0.7"/>
</svg>
