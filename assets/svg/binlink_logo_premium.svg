    <!-- Inner Eco Loop (The Leaf/B) -->
    <path d="M200 100V280C200 302.091 182.091 320 160 320H120C86.8629 320 60 293.137 60 260C60 226.863 86.8629 200 120 200H200" stroke="url(#logo_grad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Central Node -->
