<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="90" fill="#E0F2FE" fill-opacity="0.5"/>
  
  <!-- Large Bell (Center) -->
  <g transform="translate(60, 40)">
    <path d="M40 10C20 10 10 30 10 50V90H70V50C70 30 60 10 40 10Z" fill="white" stroke="#111827" stroke-width="3"/>
    <rect x="5" y="90" width="70" height="8" rx="2" fill="#111827"/>
    <path d="M30 98C30 98 30 110 40 110C50 110 50 98 50 98" stroke="#111827" stroke-width="3"/>
    
    <!-- Pulse -->
    <circle cx="40" cy="50" r="20" stroke="#16A34A" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="15;40;15" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Stylized message bars -->
  <rect x="30" y="140" width="140" height="12" rx="4" fill="white" stroke="#E5E7EB"/>
  <rect x="40" y="144" width="60" height="4" rx="2" fill="#E5E7EB"/>
  
  <rect x="30" y="160" width="100" height="12" rx="4" fill="white" stroke="#E5E7EB"/>
  <rect x="40" y="164" width="40" height="4" rx="2" fill="#E5E7EB"/>
  
  <!-- Green dot indicator -->
  <circle cx="160" cy="140" r="6" fill="#16A34A" stroke="white" stroke-width="2"/>
</svg>
