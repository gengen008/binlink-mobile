<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stack of receipts -->
  <rect x="90" y="50" width="120" height="180" rx="4" fill="white" stroke="#E5E7EB" transform="rotate(-5, 150, 140)"/>
  <rect x="95" y="45" width="120" height="180" rx="4" fill="white" stroke="#E5E7EB" transform="rotate(2, 150, 140)"/>
  
  <!-- Main Receipt -->
  <g transform="translate(90, 40)">
    <rect width="120" height="200" rx="4" fill="white" stroke="#111827" stroke-width="2"/>
    <!-- Logo area -->
    <circle cx="60" cy="30" r="15" fill="#16A34A" fill-opacity="0.1"/>
    <path d="M55 30L58 35L65 25" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Items -->
    <rect x="15" y="60" width="90" height="2" fill="#F3F4F6"/>
    <rect x="15" y="75" width="60" height="2" fill="#F3F4F6"/>
    <rect x="85" y="75" width="20" height="2" fill="#16A34A"/>
    
    <rect x="15" y="95" width="90" height="2" fill="#F3F4F6"/>
    <rect x="15" y="110" width="50" height="2" fill="#F3F4F6"/>
    <rect x="85" y="110" width="20" height="2" fill="#16A34A"/>
    
    <rect x="15" y="130" width="90" height="2" fill="#F3F4F6"/>
    
    <!-- Divider -->
    <path d="M10 150H110" stroke="#111827" stroke-width="1" stroke-dasharray="4 4"/>
    
    <!-- Total -->
    <rect x="15" y="170" width="40" height="6" rx="2" fill="#111827"/>
    <rect x="75" y="165" width="30" height="15" rx="2" fill="#DCFCE7"/>
  </g>
  
  <!-- Confetti/Sparkles -->
  <circle cx="60" cy="80" r="4" fill="#16A34A"/>
  <rect x="230" y="100" width="6" height="6" rx="1" fill="#F59E0B" transform="rotate(45, 233, 103)"/>
  <path d="M40 180L45 185M35 185L40 180" stroke="#16A34A" stroke-width="2" stroke-linecap="round"/>
  <circle cx="250" cy="200" r="3" fill="#16A34A" opacity="0.4"/>
</svg>
