<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Landscape background -->
  <path d="M0 200C50 180 100 220 150 200C200 180 250 220 300 200V300H0V200Z" fill="#F3F4F6"/>
  <path d="M0 220C80 200 120 240 200 220C280 200 300 220 300 220V300H0V220Z" fill="#E5E7EB"/>
  
  <!-- Trees -->
  <g transform="translate(40, 160)">
    <rect x="8" y="20" width="4" height="20" fill="#92400E"/>
    <circle cx="10" cy="15" r="15" fill="#16A34A" opacity="0.8"/>
  </g>
  <g transform="translate(230, 170)">
    <rect x="8" y="20" width="4" height="20" fill="#92400E"/>
    <circle cx="10" cy="15" r="15" fill="#16A34A" opacity="0.6"/>
  </g>
  
  <!-- Main Badge -->
  <g transform="translate(150, 130)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="60" fill="#F59E0B" fill-opacity="0.1">
      <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Shield/Badge -->
    <path d="M0 45L40 30V-20L0 -35L-40 -20V30L0 45Z" fill="#F59E0B" stroke="white" stroke-width="4"/>
    
    <!-- Leaf -->
    <path d="M0 -15C0 -15 15 -15 15 5C15 25 0 25 0 25C0 25 -15 25 -15 5C-15 -15 0 -15 0 -15Z" fill="white"/>
    <path d="M0 -10V15" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Floating stars -->
  <path d="M70 100L73 107H80L74 111L76 118L70 114L64 118L66 111L60 107H67L70 100Z" fill="#F59E0B" opacity="0.6"/>
  <path d="M220 80L222 84H227L224 87L225 91L221 89L217 91L218 87L215 84H220L220 80Z" fill="#F59E0B" opacity="0.4"/>
</svg>
