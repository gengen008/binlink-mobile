name: binlink_mobile
description: "BinLink Eco — Waste Marketplace (Ghana)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.5.0+1
  socket_io_client: ^3.0.0

  # Map (MapLibre GL — SmartMaps tiles)
  maplibre_gl: ^0.26.1

  # Location + GPS
  geolocator: ^12.0.0

  # Icons (Phosphor is primary icon system)
  phosphor_flutter: ^2.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Firebase Core
  firebase_core: ^3.1.1

  # Auth (Firebase / JWT)
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

  # Push notifications (FCM token registration + delivery)
  firebase_messaging: ^15.1.3

  # Crash reporting
  firebase_crashlytics: ^4.1.3

  # URL launcher (for calls, maps)
  url_launcher: ^6.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Image picker (profile photo)
  image_picker: ^1.1.2

  # Onboarding / settings persistence
  shared_preferences: ^2.3.2

  # PDF generation + sharing (receipts)
  pdf: ^3.11.1
  share_plus: ^10.0.3
  path_provider: ^2.1.4

  # Charts (analytics / carbon tracking)
  fl_chart: ^0.70.2

  # Animations
  animate_do: ^3.3.2

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # Env vars
  flutter_dotenv: ^5.1.0

  # Internationalization / formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    # Images
    - assets/images/defaultavatar.png
    # SVG
    - assets/svg/binlink_logo.svg
    - assets/svg/binlink_logo_premium.svg
    - assets/svg/pickup_marker.svg
    - assets/svg/onboarding_1.svg
    - assets/svg/onboarding_2.svg
    - assets/svg/onboarding_3.svg
    - assets/svg/onboarding_4.svg
    - assets/svg/collector_marker.svg
    - assets/svg/collector_truck.svg
    - assets/svg/rubbish_bin.svg
    - assets/svg/recycling_bag.svg
    - assets/svg/verified_badge.svg
    - assets/svg/empty_pickups.svg
    - assets/svg/empty_notifications.svg
    - assets/svg/empty_earnings.svg
    - assets/svg/google.svg
    - assets/svg/locate.svg
    - assets/svg/drawer.svg
    - assets/svg/cash.svg
    - assets/svg/envelope.svg
    - assets/svg/globe-africa.svg
    # Icons (organized by category)
    - assets/icons/navigation/
    - assets/icons/booking/
    - assets/icons/waste/
    - assets/icons/payments/
    - assets/icons/profile/
    - assets/icons/tracking/
    - assets/icons/auth/
    - assets/icons/collector/
