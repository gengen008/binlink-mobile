name: binlink_mobile
description: "BinLink Eco — Waste Marketplace (Ghana)"
publish_to: 'none'
# versionCode is overridden per-build in CI (--build-number=run number) so
# every release installs as an update. Bump versionName for user-facing releases.
version: 1.1.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.5.0+1
  socket_io_client: ^3.0.0

  # Map Rendering (MapLibre GL for Vector Tiles)
  maplibre_gl: ^0.26.0
  latlong2: 0.9.1

  # Location + GPS
  geolocator: ^12.0.0

  # Icons (Lucide is primary icon system, Phosphor for filled states)
  lucide_icons_flutter: ^3.1.14
  phosphor_flutter: ^2.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Firebase Core
  firebase_core: ^3.1.1

  # Auth (Firebase / JWT)
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

  # Push notifications (FCM token registration + delivery)
  firebase_messaging: ^15.1.3

  # Crash reporting
  firebase_crashlytics: ^4.1.3

  # URL launcher (for calls, maps)
  url_launcher: ^6.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Image picker (profile photo)
  image_picker: ^1.1.2

  # Onboarding / settings persistence
  shared_preferences: ^2.3.2

  # PDF generation + sharing (receipts)
  pdf: ^3.11.1
  share_plus: ^10.0.3
  path_provider: ^2.1.4

  # Charts (analytics / carbon tracking)
  fl_chart: ^0.70.2

  # Animations
  lottie: ^3.1.2
  animate_do: ^3.3.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # Env vars
  flutter_dotenv: ^5.1.0

  # Supabase — Realtime chat + photo storage
  supabase_flutter: ^2.8.4

  # Internationalization / formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    # Images
    - assets/images/defaultavatar.png
    - assets/images/onboarding/
    # Branding (SVGs: google, apple, paystack)
    - assets/branding/
    - assets/branding/splash/
    - assets/branding/app_icon/
    # Icons (category directories that exist)
    - assets/icons/navigation/
    - assets/icons/booking/
    - assets/icons/waste/
    - assets/icons/payments/
    - assets/icons/profile/
    - assets/icons/tracking/
    - assets/icons/wallet/
    - assets/icons/brands/
    # Lottie animations
    - assets/lottie/
    - assets/lottie/booking/
    - assets/lottie/loading/
    - assets/lottie/payments/
    - assets/lottie/empty_states/
    - assets/lottie/success/
    - assets/lottie/errors/
    - assets/lottie/wallet/
    - assets/lottie/notifications/
    # Illustrations (SVG)
    - assets/illustrations/empty_states/
    - assets/illustrations/onboarding/
    # 3D assets
    - assets/v4/3d/
