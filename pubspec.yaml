name: binlink_mobile
description: "BinLink Eco — On-demand waste collection for Ghana"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client with interceptors
  dio: ^5.6.0

  # Secure JWT storage
  flutter_secure_storage: ^9.2.2

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Real-time
  socket_io_client: ^2.0.3+1

  # Maps — MapLibre GL (SmartMaps vector tiles or OpenFreeMap fallback; no flutter_map)
  maplibre_gl: ^0.26.1

  # Location services
  geolocator: ^12.0.0

  # SVG icons (Phosphor)
  phosphor_flutter: ^2.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Firebase Auth (email/password + Google Sign-In)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Push notifications (FCM token registration + delivery)
  firebase_messaging: ^15.1.3

  # Crash reporting
  firebase_crashlytics: ^4.1.3

  # URL launcher (for calls, maps)
  url_launcher: ^6.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Image picker (profile photo)
  image_picker: ^1.1.2

  # Onboarding / settings persistence
  shared_preferences: ^2.3.2

  # PDF generation + sharing (receipts)
  pdf: ^3.11.1
  share_plus: ^10.0.3
  path_provider: ^2.1.4

  # Charts (analytics / carbon tracking)
  fl_chart: ^0.70.2

  # Animations
  animate_do: ^3.3.2

  # Lottie animations
  lottie: ^3.1.2

  # SVG rendering
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/jsons/
    - assets/svg/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500
