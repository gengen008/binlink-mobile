name: Build BinLink APKs

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.38.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: stable
          cache: true

      - name: Create .env from secrets
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env
          echo "SOCKET_URL=${{ secrets.SOCKET_URL }}" >> .env

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (catch obvious errors)
        run: flutter analyze --no-fatal-infos
        continue-on-error: false

      - name: Build BinLink-Eco (Household) APK
        run: |
          flutter build apk \
            --flavor household \
            --target lib/main_household.dart \
            --release \
            --verbose

      - name: Build BinLink-Collector APK
        run: |
          flutter build apk \
            --flavor collector \
            --target lib/main_collector.dart \
            --release \
            --verbose

      - name: Upload BinLink-Eco APK
        uses: actions/upload-artifact@v4
        with:
          name: BinLink-Eco-v2
          path: build/app/outputs/flutter-apk/app-household-release.apk
          retention-days: 30

      - name: Upload BinLink-Collector APK
        uses: actions/upload-artifact@v4
        with:
          name: BinLink-Collector-v2
          path: build/app/outputs/flutter-apk/app-collector-release.apk
          retention-days: 30

      - name: Summary
        if: success()
        run: |
          echo "### Build Successful! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Both APKs are ready to download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Flavor |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| BinLink-Eco-v2 | Household app |" >> $GITHUB_STEP_SUMMARY
          echo "| BinLink-Collector-v2 | Collector app |" >> $GITHUB_STEP_SUMMARY
