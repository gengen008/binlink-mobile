name: Build BinLink APKs

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write   # needed to create/update releases

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.38.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: stable
          cache: true

      - name: Create .env from secrets
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env
          echo "SOCKET_URL=${{ secrets.SOCKET_URL }}" >> .env

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (catch obvious errors)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build BinLink-Eco (Household) APK
        run: |
          flutter build apk \
            --flavor household \
            --target lib/main_household.dart \
            --release

      - name: Build BinLink-Collector APK
        run: |
          flutter build apk \
            --flavor collector \
            --target lib/main_collector.dart \
            --release

      - name: Rename APKs for release
        run: |
          cp build/app/outputs/flutter-apk/app-household-release.apk BinLink-Eco-v2.apk
          cp build/app/outputs/flutter-apk/app-collector-release.apk BinLink-Collector-v2.apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete old 'latest' release + tag if they exist
          gh release delete latest --yes --repo ${{ github.repository }} || true
          git push origin :refs/tags/latest || true

          # Create fresh release with both APKs attached
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "BinLink v2 — Latest Build" \
            --notes "$(cat <<'EOF'
          ## Download

          | App | File | Description |
          |-----|------|-------------|
          | **BinLink Eco** (Household) | \`BinLink-Eco-v2.apk\` | For households booking waste pickups |
          | **BinLink Collector** | \`BinLink-Collector-v2.apk\` | For collectors accepting & completing jobs |

          ## Install
          1. Download the APK for your role above
          2. On your Android phone go to **Settings → Install unknown apps** and allow your browser or file manager
          3. Open the downloaded APK and tap **Install**

          ---
          *Auto-built from the latest commit on \`main\`.*
          EOF
          )" \
            --latest \
            "BinLink-Eco-v2.apk#BinLink-Eco-v2.apk" \
            "BinLink-Collector-v2.apk#BinLink-Collector-v2.apk"

      - name: Summary
        if: success()
        run: |
          echo "### Build Successful! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APKs published to **[Releases](https://github.com/${{ github.repository }}/releases/latest)**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Role |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| BinLink-Eco-v2.apk | Household app |" >> $GITHUB_STEP_SUMMARY
          echo "| BinLink-Collector-v2.apk | Collector app |" >> $GITHUB_STEP_SUMMARY
